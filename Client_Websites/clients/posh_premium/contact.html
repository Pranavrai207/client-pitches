<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Posh by Charms Salon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,300&family=Montserrat:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent: #D4AF37;
            --bg-dark: #1A1A1A;
            --text-main: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #FDFCFB;
            color: var(--text-main);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }

        .logo {
            font-size: 1.5rem;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #666;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 80vh;
            padding: 100px 10%;
            gap: 100px;
        }

        .info h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .contact-detail {
            margin-bottom: 30px;
        }

        .contact-detail h4 {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .contact-detail p {
            font-size: 1.1rem;
            font-weight: 700;
        }

        form {
            background: white;
            padding: 60px;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 25px;
        }

        input,
        textarea {
            width: 100%;
            padding: 15px;
            border: none;
            border-bottom: 1px solid #ddd;
            font-family: inherit;
            transition: 0.3s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-bottom-color: var(--accent);
        }

        .btn {
            background: var(--bg-dark);
            color: white;
            border: none;
            padding: 20px 40px;
            width: 100%;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .whatsapp {
            display: block;
            text-align: center;
            padding: 15px;
            background: #25D366;
            color: white;
            text-decoration: none;
            margin-top: 20px;
            font-weight: 700;
        }
    
/* --- UNIVERSAL MOBILE RESPONSIVENESS FIX --- */
@media (max-width: 768px) {
    /* Fix Navigation Position */
    nav {
        width: 100% !important;
        left: 0 !important;
        top: 0 !important;
        transform: none !important;
        border-radius: 0 !important;
        padding: 15px 20px !important;
        position: fixed !important;
        border: none !important;
        border-bottom: 1px solid var(--border, rgba(255,255,255,0.1)) !important;
        box-sizing: border-box !important;
    }
    .nav-links {
        top: 60px !important;
        border-radius: 0 0 20px 20px !important;
        width: 100% !important;
        left: 0 !important;
        box-sizing: border-box !important;
    }
    
    /* Aggressively scale down typography */
    h1 { font-size: 2.2rem !important; line-height: 1.2 !important; word-wrap: break-word !important; }
    h2, .section-title h2 { font-size: 1.8rem !important; line-height: 1.3 !important; }
    h3 { font-size: 1.5rem !important; line-height: 1.4 !important; }
    p { font-size: 0.95rem !important; line-height: 1.5 !important; }
    
    /* Fix Hero sizing and image cropping */
    .hero, header {
        min-height: 100vh !important;
        height: auto !important;
        background-attachment: scroll !important; /* fixes iOS bug */
        background-position: center center !important;
        background-size: cover !important;
        padding-top: 100px !important;
        padding-bottom: 60px !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        box-sizing: border-box !important;
    }
    
    /* Fix sections and internal paddings */
    section {
        padding: 60px 20px !important;
        box-sizing: border-box !important;
        width: 100% !important;
    }
    
    /* Fix flex rows that should be columns on mobile */
    .grid, .features, .stats-grid, .footer-grid, .location-container, .contact-container, .services-grid, .portfolio-grid {
        gap: 20px !important;
        display: flex !important;
        flex-direction: column !important;
        width: 100% !important;
    }

    .service-card, .portfolio-item, .stat-item, .contact-info, .contact-form, .review-box, .pricing-card {
        width: 100% !important;
        box-sizing: border-box !important;
        margin: 0 !important;
    }
    
    /* Prevent form outbounds */
    form {
        width: 100% !important;
        padding: 0 !important;
        box-sizing: border-box !important;
    }
    input, select, textarea {
        width: 100% !important;
        box-sizing: border-box !important;
    }
    .form-row {
        display: flex !important;
        flex-direction: column !important;
        gap: 15px !important;
    }
    
    /* Button formatting - Fixed from massive size */
    .btn, .cta-btn, button {
        padding: 14px 28px !important;
        font-size: 16px !important;
        width: auto !important;
        max-width: 100% !important;
        text-align: center !important;
        box-sizing: border-box !important;
        margin-top: 10px !important;
        display: inline-block !important;
        min-height: 48px !important; /* Thumb-friendly mobile standard */
        border-radius: 50px !important; /* Premium feel */
    }
    
    /* Global fixes for horizontal scroll */
    html, body {
        max-width: 100vw !important;
        overflow-x: hidden !important;
    }
}
</style>

</head>

<body>
    <nav>
        <a href="index.html" class="logo">Posh</a>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html" style="color:var(--accent)">Contact</a>
        </div>
    </nav>
    <div class="container">
        <div class="info">
            <h1>Connect <span>With Us</span></h1>
            <div class="contact-detail">
                <h4>Address</h4>
                <p>M-63, Block M, Lajpat Nagar II,<br>New Delhi, Delhi 110024</p>
            </div>
            <div class="contact-detail">
                <h4>Phone</h4>
                <p>011 4015 7262</p>
            </div>
            <div class="contact-detail">
                <h4>Hours</h4>
                <p>Mon - Sun: 10:00 AM - 08:30 PM</p>
            </div>
            <a href="https://wa.me/911140157262" class="whatsapp">Chat on WhatsApp</a>
        </div>
        <form onsubmit="event.preventDefault(); alert('Booking Inquiry Received! We will call you back.')">
            <div class="form-group"><input type="text" placeholder="Full Name" required></div>
            <div class="form-group"><input type="email" placeholder="Email Address" required></div>
            <div class="form-group"><input type="tel" placeholder="Phone Number" required></div>
            <div class="form-group"><textarea rows="4" placeholder="Desired Service & Date"></textarea></div>
            <button type="submit" class="btn">Request Booking</button>
        </form>
    </div>
    <footer style="padding:40px; text-align:center; color:#999; font-size:0.8rem; border-top:1px solid #eee;">
        &copy; 2026 Posh by Charms Salon. Crafted with Precision.
    </footer>

    <script>
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');

        if (mobileMenu && navLinks) {
            mobileMenu.addEventListener('click', () => {
                navLinks.classList.toggle('active');
            });
        }
    </script>
</body>

</html>
