<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | JIANSH Spark Plugs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF3333;
            --bg-dark: #000;
            --text-main: #fff;
            --text-muted: #A0A0A0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .container {
            padding: 100px 8%;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 80px;
        }

        .info h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .info h1 span {
            color: var(--primary);
        }

        .contact-item {
            margin-bottom: 40px;
        }

        .contact-item h4 {
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 10px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .contact-item p {
            font-size: 1.2rem;
            font-weight: 700;
        }

        form {
            background: #111;
            padding: 50px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        input,
        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #333;
            background: #000;
            color: #fff;
            font-size: 1rem;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary);
            outline: none;
        }

        .submit-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 20px;
            width: 100%;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #CC0000;
            transform: translateY(-2px);
        }

        footer {
            padding: 40px 8%;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            font-size: 0.8rem;
        }
    
/* --- UNIVERSAL MOBILE RESPONSIVENESS FIX --- */
@media (max-width: 768px) {
    /* Fix Navigation Position */
    nav {
        width: 100% !important;
        left: 0 !important;
        top: 0 !important;
        transform: none !important;
        border-radius: 0 !important;
        padding: 15px 20px !important;
        position: fixed !important;
        border: none !important;
        border-bottom: 1px solid var(--border, rgba(255,255,255,0.1)) !important;
        box-sizing: border-box !important;
    }
    .nav-links {
        top: 60px !important;
        border-radius: 0 0 20px 20px !important;
        width: 100% !important;
        left: 0 !important;
        box-sizing: border-box !important;
    }
    
    /* Aggressively scale down typography */
    h1 { font-size: 2.2rem !important; line-height: 1.2 !important; word-wrap: break-word !important; }
    h2, .section-title h2 { font-size: 1.8rem !important; line-height: 1.3 !important; }
    h3 { font-size: 1.5rem !important; line-height: 1.4 !important; }
    p { font-size: 0.95rem !important; line-height: 1.5 !important; }
    
    /* Fix Hero sizing and image cropping */
    .hero, header {
        min-height: 100vh !important;
        height: auto !important;
        background-attachment: scroll !important; /* fixes iOS bug */
        background-position: center center !important;
        background-size: cover !important;
        padding-top: 100px !important;
        padding-bottom: 60px !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        box-sizing: border-box !important;
    }
    
    /* Fix sections and internal paddings */
    section {
        padding: 60px 20px !important;
        box-sizing: border-box !important;
        width: 100% !important;
    }
    
    /* Fix flex rows that should be columns on mobile */
    .grid, .features, .stats-grid, .footer-grid, .location-container, .contact-container, .services-grid, .portfolio-grid {
        gap: 20px !important;
        display: flex !important;
        flex-direction: column !important;
        width: 100% !important;
    }

    .service-card, .portfolio-item, .stat-item, .contact-info, .contact-form, .review-box, .pricing-card {
        width: 100% !important;
        box-sizing: border-box !important;
        margin: 0 !important;
    }
    
    /* Prevent form outbounds */
    form {
        width: 100% !important;
        padding: 0 !important;
        box-sizing: border-box !important;
    }
    input, select, textarea {
        width: 100% !important;
        box-sizing: border-box !important;
    }
    .form-row {
        display: flex !important;
        flex-direction: column !important;
        gap: 15px !important;
    }
    
    /* Button formatting */
    .btn, .cta-btn, button {
        padding: 12px 24px !important;
        font-size: 1rem !important;
        width: 100% !important;
        text-align: center !important;
        box-sizing: border-box !important;
        margin-top: 10px !important;
        display: block !important;
    }
    
    /* Global fixes for horizontal scroll */
    html, body {
        max-width: 100vw !important;
        overflow-x: hidden !important;
    }
}
</style>

</head>

<body>
    <nav>
        <div class="logo">JIAN<span>SH</span></div>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="quality.html">Quality Checks</a>
            <a href="contact.html" style="color: var(--primary);">Contact</a>
        </div>
    </nav>
    <div class="container">
        <div class="info">
            <h1>Get in <span>Touch</span></h1>
            <div class="contact-item">
                <h4>Address</h4>
                <p>S-24, Balram Nagar, Loni Industrial Area, Ghaziabad, Uttar Pradesh 201102, India</p>
            </div>
            <div class="contact-item">
                <h4>Email</h4>
                <p>jianshsparkplug@gmail.com</p>
            </div>
            <div class="contact-item">
                <h4>Phone</h4>
                <p>+91 8595010027</p>
            </div>
            <a href="https://wa.me/918595010027"
                style="display: inline-block; padding: 15px 30px; background: #25D366; color: white; text-decoration: none; font-weight: 900; border-radius: 4px;">Chat
                on WhatsApp</a>
        </div>
        <form>
            <div class="form-group"><label>Name</label><input type="text" placeholder="Your Name"></div>
            <div class="form-group"><label>Email</label><input type="email" placeholder="Your Email"></div>
            <div class="form-group"><label>Massage</label><textarea rows="5" placeholder="How can we help?"></textarea>
            </div>
            <button type="submit" class="submit-btn" onclick="alert('Inquiry Sent!')">Send Message</button>
        </form>
    </div>
    <footer>&copy; 2026 JIANSH Spark Plugs. All Rights Reserved.</footer>

    <script>
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');

        if (mobileMenu && navLinks) {
            mobileMenu.addEventListener('click', () => {
                navLinks.classList.toggle('active');
            });
        }
    </script>
</body>

</html>
